[build]
  command = "npm run build"
  publish = "dist"

# /api/* 요청을 백엔드 서버로 프록시 (Mixed Content 방지)
[[redirects]]
  from = "/api/*"
  to = "http://168.107.7.89/api/:splat"
  status = 200
  force = true

# React Router 클라이언트 사이드 라우팅 — 새로고침 시 404 방지
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
